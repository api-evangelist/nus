apis:
  - aid: nus:scholarbank-rest
    name: ScholarBank@NUS DSpace REST API
    description: >-
      ScholarBank@NUS is the digital institutional repository of the National
      University of Singapore, built on DSpace 7.6. Its HAL-style REST API
      exposes communities, collections, items, bitstreams, and metadata for the
      university's scholarly output, theses, and research data underpinning
      published findings.
    humanURL: https://scholarbank.nus.edu.sg/
    baseURL: https://scholarbank.nus.edu.sg/server/api
    tags: [ Repository, Research, Open Access, DSpace, Scholarly ]
    properties:
      - type: Documentation
        url: https://scholarbank.nus.edu.sg/server/api
  - aid: nus:scholarbank-oai
    name: ScholarBank@NUS OAI-PMH Interface
    description: >-
      OAI-PMH metadata harvesting endpoint for ScholarBank@NUS, supporting
      standard verbs (Identify, ListRecords, ListMetadataFormats, GetRecord)
      for harvesting Dublin Core and other metadata formats from the NUS
      institutional repository.
    humanURL: https://scholarbank.nus.edu.sg/
    baseURL: https://scholarbank.nus.edu.sg/oai/request
    tags: [ Repository, OAI-PMH, Metadata, Harvesting, Open Access ]
    properties:
      - type: Documentation
        url: https://scholarbank.nus.edu.sg/oai/request?verb=Identify
  - aid: nus:nusmods
    name: NUSMods API (Unofficial / Community)
    description: >-
      Community-maintained, unofficial JSON API providing NUS module, course,
      and timetable data normalized by the NUSModifications open-source project.
