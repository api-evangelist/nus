---
aid: nus
name: National University of Singapore
description: >-
  The National University of Singapore (NUS) is Singapore's flagship public
  research university, ranked #8 in the QS World University Rankings 2025. NUS
  does not operate a single unified, public developer portal; its documented,
  programmatically accessible footprint is concentrated in its open scholarly
  infrastructure. The institutional repository ScholarBank@NUS runs on DSpace
  7.6 and exposes both a REST API and an OAI-PMH metadata harvesting interface.
  Module and timetable data is also available via the community-maintained
  NUSMods API (unofficial), which normalizes NUS course information. Most
  administrative and student-facing systems sit behind ADFS/SAML single sign-on
  and are not publicly documented.
